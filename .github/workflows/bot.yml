# BIST Haber Botu — GitHub Actions üzerinde zamanlanmış çalıştırma.
#
# Her ~10 dakikada bir tek tur çalışır (GitHub cron'u esnektir; fiilen 10-20 dk).
# seen.db, actions/cache ile turlar arasında taşınır — cache kaybolursa bot ilk
# turu sessiz geçtiği için spam olmaz.
#
# Kurulum: Repo Settings -> Secrets and variables -> Actions -> New repository secret
#   DISCORD_WEBHOOK_URL = Discord webhook adresin
name: bist-haber-botu

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # elle tetiklemek için (Actions sekmesi -> Run workflow)

concurrency:
  group: bot
  cancel-in-progress: false # çakışan turlar kuyruğa girsin, yarıda kesilmesin

# 'durum' dalına status.json push'lamak için (bkz. son adım) yazma izni gerek
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      # Önceki turun seen.db'sini geri yükle (anahtarlar değişmez olduğundan
      # her tur yeni anahtarla kaydedilir, restore-keys en yenisini bulur).
      # v2: hedefli arama feed'leri eklenince önek bilinçli değiştirildi —
      # eski db bulunmaz, taze db ilk turu sessiz geçirir (backlog seli olmaz).
      - uses: actions/cache/restore@v5
        with:
          path: seen.db
          key: seen-db-v2-${{ github.run_id }}
          restore-keys: |
            seen-db-v2-

      - name: Botu çalıştır (tek tur)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_ONCE: "1"
          ENABLE_KAP: "0" # KAP, veri merkezi IP'lerini zaten engelliyor; 20 sn'lik beklemeyi atla
        run: python main.py

      - uses: actions/cache/save@v5
        if: always() # tur hata verse bile işaretlenenleri kaybetme
        with:
          path: seen.db
          key: seen-db-v2-${{ github.run_id }}

      # seen.db özetini 'durum' dalına status.json olarak yayınla — /health
      # üretim kayıt sayısını buradan okur (Actions cache dışarıdan okunamaz).
      # Dal her turda orphan olarak yeniden yaratılıp force-push'lanır: tarihçe
      # büyümez, main'e commit gürültüsü bulaşmaz.
      - name: Durumu yayınla (durum dalı)
        if: always()
        run: |
          python - <<'PYEOF'
          import json, sqlite3, time
          out = {"ts": time.time(), "run_id": "${{ github.run_id }}"}
          try:
              conn = sqlite3.connect("file:seen.db?mode=ro", uri=True)
              n, mx, mn = conn.execute("SELECT COUNT(*), MAX(ts), MIN(ts) FROM seen").fetchone()
              conn.close()
              out.update({"kayit": n or 0, "son_ts": mx, "ilk_ts": mn})
          except Exception as ex:
              out["hata"] = f"{type(ex).__name__}: {ex}"
          json.dump(out, open("status.json", "w"))
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan durum
          git reset
          git add -f status.json
          git commit -m "durum: $(date -u +%FT%TZ)"
          git push -f origin durum
